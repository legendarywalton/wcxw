<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aruba Watch Schedule · Jun 28 – Jul 5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    /* ── FIFA World Cup 2026 official colors ── */
    --wc-navy:   #003DA5;   /* primary navy */
    --wc-red:    #E8112D;   /* primary red */
    --wc-navy-pale: #D6E2F8;
    --wc-red-pale:  #FCE0E3;

    /* ── Wimbledon official colors ── */
    --wim-green:  #006633;  /* All England Club dark green */
    --wim-purple: #6B0F6E;  /* Wimbledon signature purple */
    --wim-gold:   #C6A84B;  /* Wimbledon gold accent */
    --wim-green-pale:  #D4EDD9;
    --wim-purple-pale: #EDD9EE;

    /* ── Shared neutrals ── */
    --bg:      #F0EDE5;     /* warmer off-white */
    --bg-rule: #DDD8CC;
    --charcoal: #141414;
    --mid:     #555;
    --light:   #8a8578;
    --white:   #FFFFFF;
    --card:    #FFFFFF;
    --shadow:  0 3px 14px rgba(0,0,0,0.08);
    --shadow-lift: 0 8px 22px rgba(0,0,0,0.13);
    --r:       18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--charcoal);
    font-family: 'Nunito', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── ANIMATION KEYFRAMES ── */
  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.025); }
    100% { transform: scale(1); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
  }
  .pop  { animation: pop 0.28s ease; }

  /* ─── HEADER — split brand treatment ───────── */
  header {
    position: relative;
    overflow: hidden;
    background: linear-gradient(105deg, var(--wc-navy) 50%, var(--wim-green) 50%);
    padding: 0;
  }
  .header-inner {
    position: relative;
    z-index: 1;
    padding: 26px 20px 24px;
    text-align: center;
    color: var(--white);
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: linear-gradient(90deg, var(--wc-red) 50%, var(--wim-purple) 50%);
    z-index: 2;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -14px; left: 0; right: 0;
    height: 16px;
    background: var(--bg);
    border-radius: 16px 16px 0 0;
    z-index: 2;
  }
  .eyebrow {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 7px;
  }
  header h1 { font-size: 30px; font-weight: 900; letter-spacing: -0.8px; }
  .header-sports {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .hs-pill {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.3px;
    padding: 5px 13px;
    border-radius: 20px;
    background: rgba(255,255,255,0.18);
    border: 1.5px solid rgba(255,255,255,0.35);
    color: #fff;
    backdrop-filter: blur(2px);
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s, opacity 0.15s, transform 0.12s cubic-bezier(.34,1.56,.64,1);
  }
  .hs-pill:hover { background: rgba(255,255,255,0.28); }
  .hs-pill:active { transform: scale(0.93); }
  .hs-pill.off {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.15);
    opacity: 0.5;
    text-decoration: line-through;
  }
  .sub { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.6); margin-top: 10px; }

  /* ─── TABS ───────────────────── */
  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 2px solid var(--bg-rule);
    margin-top: 14px;
    overflow-x: auto;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 12px 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.2px;
    border: none;
    background: none;
    color: var(--light);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .tab.on { color: var(--wc-navy); border-bottom-color: var(--wc-navy); }

  /* ─── LAYOUT ─────────────────── */
  main { max-width: 680px; margin: 0 auto; padding: 18px 14px 48px; }
  #v-all, #v-sched { animation: slideUp 0.25s ease; }

  /* ─── DAY GROUP ──────────────── */
  .day-group { margin-bottom: 26px; }
  .day-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 3px solid transparent;
    border-image: linear-gradient(90deg, var(--wc-navy), var(--wim-purple)) 1;
  }
  .day-name { font-size: 19px; font-weight: 900; letter-spacing: -0.4px; }
  .day-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--light);
    letter-spacing: 0.2px;
  }
  .day-sel-count {
    margin-left: auto;
    font-size: 11px;
    font-weight: 800;
    color: var(--wim-gold);
    background: #FFF5D6;
    padding: 2px 9px;
    border-radius: 12px;
  }

  /* ─── MATCH CARD ─────────────── */
  .card {
    background: var(--card);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    overflow: hidden;
    border: 2px solid transparent;
    transition: border-color 0.14s, box-shadow 0.18s, transform 0.18s;
  }
  .card:hover { box-shadow: var(--shadow-lift); transform: translateY(-2px); }
  /* sport background tints */
  .wc-card  { background: linear-gradient(180deg, rgba(0,61,165,0.035), rgba(0,61,165,0.015)); }
  .wim-card { background: linear-gradient(180deg, rgba(107,15,110,0.04), rgba(0,102,51,0.02)); }
  /* selection borders — sport-aware */
  .card.sel-j.wc-card  { border-color: var(--wc-navy); }
  .card.sel-j.wim-card { border-color: var(--wim-purple); }
  .card.sel-a.wc-card  { border-color: var(--wc-red); }
  .card.sel-a.wim-card { border-color: var(--wim-green); }
  .card.sel-both        { border-color: var(--wim-gold); }

  .sport-stripe { height: 5px; width: 100%; }
  .stripe-wc  { background: linear-gradient(90deg, var(--wc-navy) 55%, var(--wc-red) 100%); }
  .stripe-wim { background: linear-gradient(90deg, var(--wim-green) 45%, var(--wim-purple) 100%); }

  .card-body {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 12px;
  }

  /* time — pill badge in sport color */
  .time-col {
    flex-shrink: 0;
    width: 58px;
    border-radius: 14px;
    padding: 8px 4px;
    text-align: center;
    color: #fff;
  }
  .time-wc  { background: linear-gradient(150deg, var(--wc-navy), #002b75); }
  .time-wim { background: linear-gradient(150deg, var(--wim-purple), #4d0a50); }
  .time-num { font-size: 14px; font-weight: 900; line-height: 1.05; }
  .time-ap { font-size: 8px; font-weight: 800; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

  /* content */
  .content { flex: 1; min-width: 0; }
  .sport-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 4px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .tag-wc  { color: var(--wc-navy);    background: var(--wc-navy-pale); }
  .tag-wim { color: var(--wim-purple); background: var(--wim-purple-pale); }
  .matchup      { font-size: 15px; font-weight: 700; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .matchup-wrap { font-size: 14px; font-weight: 700; line-height: 1.3; white-space: normal; }
  .meta { font-size: 10px; font-weight: 600; color: var(--light); margin-top: 3px; }
  .court-tag {
    display: inline-block;
    background: var(--wim-purple);
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.3px;
    padding: 1px 6px;
    border-radius: 6px;
    margin-right: 5px;
    vertical-align: middle;
  }
  .session-note {
    font-size: 10px;
    font-weight: 600;
    color: var(--light);
    font-style: italic;
    margin-top: 4px;
  }

  /* selector buttons — Jordan = WC navy, Anasa = Wimbledon purple */
  .sels { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .sb {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 2.5px solid;
    background: var(--white);
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s cubic-bezier(.34,1.56,.64,1), background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .sb:active { transform: scale(0.85); }
  .sb-j { border-color: var(--wc-navy); color: var(--wc-navy); }
  .sb-j.on { background: var(--wc-navy); color: var(--white); }
  .sb-a { border-color: var(--wim-purple); color: var(--wim-purple); }
  .sb-a.on { background: var(--wim-purple); color: var(--white); }
  .sb.on { transform: scale(1.08); }
  .sb.on:active { transform: scale(0.9); }

  /* ─── SCHEDULE VIEW ──────────── */
  #v-sched { display: none; }
  .sched-filters {
    display: flex;
    gap: 7px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  .sched-filters span { font-size: 12px; font-weight: 700; color: var(--light); }
  .fb {
    padding: 6px 15px;
    border-radius: 20px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 800;
    border: 2px solid;
    cursor: pointer;
    transition: transform 0.12s cubic-bezier(.34,1.56,.64,1), background 0.12s, color 0.12s;
  }
  .fb:active { transform: scale(0.92); }
  .fb-j    { border-color: var(--wc-navy);    color: var(--wc-navy);    background: var(--wc-navy-pale); }
  .fb-j.off { background: transparent; color: var(--light); border-color: var(--bg-rule); }
  .fb-a    { border-color: var(--wim-purple); color: var(--wim-purple); background: var(--wim-purple-pale); }
  .fb-a.off { background: transparent; color: var(--light); border-color: var(--bg-rule); }
  .fb-both  { border-color: var(--wim-gold);  color: #7A5800;           background: #FFF5D6; }
  .fb-both.off { background: transparent; color: var(--light); border-color: var(--bg-rule); }

  .empty { text-align: center; padding: 48px 16px; font-size: 14px; font-weight: 600; color: var(--light); }
  .empty .ico { font-size: 38px; margin-bottom: 12px; }

  .sched-card {
    background: var(--card);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    padding: 12px 15px;
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    gap: 11px;
    border-left: 5px solid transparent;
    animation: slideUp 0.25s ease;
    transition: box-shadow 0.18s, transform 0.18s;
  }
  .sched-card:hover { box-shadow: var(--shadow-lift); transform: translateY(-2px); }
  .sl-wc  { border-left-color: var(--wc-navy); }
  .sl-wim { border-image: linear-gradient(180deg, var(--wim-green) 0%, var(--wim-purple) 100%) 1; }
  .stime { font-size: 13px; font-weight: 900; color: var(--mid); flex-shrink: 0; min-width: 62px; }
  .smain { flex: 1; min-width: 0; }
  .smatchup { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .smatchup-wrap { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .smeta { font-size: 10px; font-weight: 600; color: var(--light); margin-top: 2px; }
  .swho { display: flex; gap: 4px; flex-shrink: 0; }
  .sbadge {
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 900;
  }
  .sbj { background: var(--wc-navy);    color: #fff; }
  .sba { background: var(--wim-purple); color: #fff; }

  .conflict-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: #FFF3CD;
    border: 1.5px solid #FFD24D;
    border-radius: 8px;
    padding: 2px 7px;
    font-size: 9px;
    font-weight: 800;
    color: #856404;
    margin-left: 6px;
    animation: shake 0.4s ease;
  }

  /* ─── KEY BAR ─────────────────── */
  .key-bar {
    background: var(--card);
    border-bottom: 1px solid var(--bg-rule);
    padding: 11px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .key-items { display: flex; gap: 16px; flex-wrap: wrap; }
  .ki { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--mid); }
  .dot {
    width: 28px; height: 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .d-wc  { background: linear-gradient(90deg, var(--wc-navy) 55%, var(--wc-red) 100%); }
  .d-wim { background: linear-gradient(90deg, var(--wim-green) 45%, var(--wim-purple) 100%); }
  .key-note { font-size: 10px; font-weight: 600; color: var(--light); font-style: italic; }

  @media (max-width: 460px) {
    header h1 { font-size: 24px; }
    .matchup { font-size: 14px; }
  }

  /* ══════════════════════════════════════════
     DARK MODE
     Variables swap; sport colors lighten so
     they stay legible on dark surfaces.
  ══════════════════════════════════════════ */
  @media (prefers-color-scheme: dark) {
    :root {
      /* ── Neutrals ── */
      --bg:        #111318;   /* deep navy-tinted dark — echoes WC navy */
      --bg-rule:   rgba(255,255,255,0.1);
      --charcoal:  #F0EDE5;   /* inverted: light-mode bg becomes dark-mode text */
      --mid:       #B8B4AC;
      --light:     #7A7670;
      --white:     #1C1F28;   /* buttons/backgrounds that were white are now dark */
      --card:      #1C1F28;   /* card surface: lighter than bg, slight navy tint */
      --shadow:    0 2px 0px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
      --shadow-lift: 0 4px 0px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.12);

      /* ── Sport colors: lightened for dark backgrounds ── */
      --wc-navy:      #4D8BF0;  /* lightened so navy is readable on dark card */
      --wc-red:       #FF4D63;  /* brighter red stays punchy */
      --wc-navy-pale: rgba(77,139,240,0.18);
      --wc-red-pale:  rgba(255,77,99,0.15);

      --wim-green:       #2EC077;  /* lifted green — original is too dark */
      --wim-purple:      #C060C5;  /* lighter purple for legibility */
      --wim-gold:        #E0C46A;  /* bumped gold stays warm */
      --wim-green-pale:  rgba(46,192,119,0.15);
      --wim-purple-pale: rgba(192,96,197,0.18);
    }

    /* Card tints — darker surfaces need more opacity to register */
    .wc-card  { background: linear-gradient(180deg, rgba(77,139,240,0.1), rgba(77,139,240,0.04)); }
    .wim-card { background: linear-gradient(180deg, rgba(192,96,197,0.1), rgba(46,192,119,0.04)); }

    /* Card hover: glow border instead of shadow lift */
    .card:hover     { transform: translateY(-2px); box-shadow: var(--shadow-lift); }
    .sched-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lift); }

    /* Time pills: keep sport color but slightly lighter for legibility */
    .time-wc  { background: linear-gradient(150deg, #1A4EA8, #102E6B); }
    .time-wim { background: linear-gradient(150deg, #521255, #340A36); }

    /* Day-header gradient rule: lighter so it shows on dark bg */
    .day-head {
      border-image: linear-gradient(90deg, var(--wc-navy), var(--wim-purple)) 1;
    }

    /* Gold count badge */
    .day-sel-count { background: rgba(224,196,106,0.18); color: var(--wim-gold); }

    /* Filter buttons active state */
    .fb-both { color: var(--wim-gold); background: rgba(224,196,106,0.15); }

    /* Conflict tag — keep amber readable */
    .conflict-tag {
      background: rgba(255,211,77,0.15);
      border-color: rgba(255,211,77,0.4);
      color: #FFD966;
    }

    /* Tab active indicator — use lighter sport color */
    .tab.on { color: var(--wc-navy); border-bottom-color: var(--wc-navy); }

    /* Key bar rule */
    .key-bar { border-bottom-color: var(--bg-rule); }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="eyebrow">Aruba · Jun 28 – Jul 5, 2026</div>
    <h1>Your Watch Schedule</h1>
    <div class="header-sports">
      <button class="hs-pill" id="pill-wc"  onclick="toggleSport('wc')">⚽ FIFA World Cup 2026</button>
      <button class="hs-pill" id="pill-wim" onclick="toggleSport('wim')">🎾 Wimbledon 2026</button>
    </div>
    <div class="sub">All times in Aruba Standard Time (AST = UTC−4 = Eastern Time)</div>
    <div class="sub" style="margin-top:5px;color:rgba(255,255,255,0.78);font-weight:700;">✓ Round of 32 &amp; Wimbledon Day 1 confirmed · Updated Jun 28, 2026</div>
  </div>
</header>

<div class="key-bar">
  <div class="key-items">
    <div class="ki"><div class="dot d-wc"></div> World Cup</div>
    <div class="ki"><div class="dot d-wim"></div> Wimbledon</div>
  </div>
  <div class="key-note">Tap <strong>J</strong> / <strong>A</strong> to claim a match</div>
</div>

<div class="tabs">
  <button class="tab on" onclick="show('all',this)">All Matches</button>
  <button class="tab" onclick="show('sched',this)">📋 My Schedule</button>
</div>

<main>
  <div id="v-all"></div>
  <div id="v-sched">
    <div class="sched-filters">
      <span>Show:</span>
      <button class="fb fb-j" id="fb-j" onclick="tf('j')">Jordan</button>
      <button class="fb fb-a" id="fb-a" onclick="tf('a')">Anasa</button>
      <button class="fb fb-both" id="fb-both" onclick="tf('both')">Both</button>
    </div>
    <div id="sched-list"></div>
  </div>
</main>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
// AST = ET = UTC-4. Wimbledon BST times: 11am=6am, 1pm=8am, 1:30pm=8:30am AST
// Outer courts start 11am BST = 6am AST
// Court 1 start 1pm BST = 8am AST
// Centre Court start 1:30pm BST = 8:30am AST
// "Not Before 4:30pm BST" = 11:30am AST

const M = [

  // ══ SUN JUNE 28 ══════════════════════════════════════
  { id:'wc-628-1', sport:'wc', date:'Sun, June 28', ds:'2026-06-28',
    t:'3:00 PM', sm:15*60, matchup:'South Africa vs Canada',
    meta:'Round of 32 · SoFi Stadium, Los Angeles' },

  // ══ MON JUNE 29 — WIMBLEDON DAY 1 (individual matches confirmed) ══════════
  // Outer courts: 6am AST start
  { id:'wim-629-oc', sport:'wim', date:'Mon, June 29', ds:'2026-06-29',
    t:'6:00 AM', sm:6*60, isSession:true,
    matchup:'Outer Courts — 1st Round',
    meta:'Courts 2–18 · Many first-round matches begin',
    sessionNote:'Dozens of 1R matches simultaneously' },

  // Court 1: 8am AST start
  { id:'wim-629-c1-1', sport:'wim', date:'Mon, June 29', ds:'2026-06-29',
    t:'8:00 AM', sm:8*60, court:'No. 1 Court',
    matchup:'Raducanu [30] vs Ruzic',
    meta:'No. 1 Court · 1st Round' },
  { id:'wim-629-c1-2', sport:'wim', date:'Mon, June 29', ds:'2026-06-29',
    t:'~9:30 AM', sm:9*60+30, court:'No. 1 Court',
    matchup:'Medvedev [8] vs Cilic',
    meta:'No. 1 Court · 1st Round · after Raducanu' },
  { id:'wim-629-c1-3', sport:'wim', date:'Mon, June 29', ds:'2026-06-29',
    t:'~11:00 AM', sm:11*60, court:'No. 1 Court',
    matchup:'Andreeva [5] vs Linette',
    meta:'No. 1 Court · 1st Round · 3rd match on' },

  // Centre Court: 8:30am AST start
  { id:'wim-629-cc-1', sport:'wim', date:'Mon, June 29', ds:'2026-06-29',
    t:'8:30 AM', sm:8*60+30, court:'Centre Court',
    matchup:'Sinner [1] vs Kecmanovic',
    meta:'Centre Court · 1st match · defending champion opens' },
  { id:'wim-629-cc-2', sport:'wim', date:'Mon, June 29', ds:'2026-06-29',
    t:'~10:30 AM', sm:10*60+30, court:'Centre Court',

// ─── STATE ────────────────────────────────────────────────────────────────────
const sel = {};
M.forEach(m => sel[m.id] = new Set());
const filt = {j:true, a:true, both:true};
const sportFilt = {wc:true, wim:true};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const ss = id => { const s = sel[id]; const j=s.has('j'), a=s.has('a'); return j&&a?'both':j?'j':a?'a':'none'; };
const tog = (id, p, btn) => {
  sel[id].has(p)?sel[id].delete(p):sel[id].add(p);
  render();
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) {
    card.classList.add('pop');
    card.addEventListener('animationend', () => card.classList.remove('pop'), { once:true });
  }
};

// ─── RENDER ALL MATCHES ───────────────────────────────────────────────────────
function renderAll() {
  const byDate = {}, order = [];
  M.forEach(m => { if(!byDate[m.ds]){byDate[m.ds]=[];order.push(m.ds);} byDate[m.ds].push(m); });

  const container = document.getElementById('v-all');
  container.innerHTML = '';

  order.forEach(ds => {
    const allMatches = byDate[ds].sort((a,b)=>a.sm-b.sm);
    // only show matches for active sports
    const matches = allMatches.filter(m => sportFilt[m.sport]);
    if (matches.length === 0) return; // skip day entirely if both sports filtered out

    const s = matches[0];
    const cnt = matches.filter(m=>ss(m.id)!=='none').length;

    const grp = document.createElement('div');
    grp.className = 'day-group';
    grp.innerHTML = `<div class="day-head">
      <span class="day-name">${s.date}</span>
      <span class="day-label">${dayLabel(ds)}</span>
      ${cnt>0?`<span class="day-sel-count">${cnt} selected</span>`:''}
    </div>`;

    matches.forEach(m => {
      const state = ss(m.id);
      const card = document.createElement('div');
      card.className = 'card ' + m.sport + '-card' + (state!=='none'?' sel-'+state:'');
      card.setAttribute('data-id', m.id);

      const timeParts = m.t.match(/^(\d+:\d+)\s*([AP]M)?$/) || [m.t, m.t, ''];
      const timeNum = timeParts[1] || m.t;
      const timeAP = timeParts[2] || '';

      let matchupHTML;
      if (m.isSession) {
        matchupHTML = `<div class="matchup-wrap">${m.sport==='wim'?`<span class="court-tag">${courtShort(m.matchup)}</span> `:''}${m.matchup}</div>`;
      } else if (m.court) {
        matchupHTML = `<div class="matchup"><span class="court-tag">${m.court.replace('No. ','C')}</span> ${m.matchup}</div>`;
      } else {
        matchupHTML = `<div class="matchup">${m.matchup}</div>`;
      }

      card.innerHTML = `
        <div class="sport-stripe stripe-${m.sport}"></div>
        <div class="card-body">
          <div class="time-col time-${m.sport}">
            <div class="time-num">${timeNum}</div>
            <div class="time-ap">${timeAP} AST</div>
          </div>
          <div class="content">
            <div class="sport-tag tag-${m.sport}">${m.sport==='wc'?'⚽ WORLD CUP':'🎾 WIMBLEDON'}</div>
            ${matchupHTML}
            <div class="meta">${m.meta}</div>
            ${m.sessionNote?`<div class="session-note">ℹ ${m.sessionNote}</div>`:''}
          </div>
          <div class="sels">
            <button class="sb sb-j${sel[m.id].has('j')?' on':''}" onclick="event.stopPropagation();tog('${m.id}','j',this)">J</button>
            <button class="sb sb-a${sel[m.id].has('a')?' on':''}" onclick="event.stopPropagation();tog('${m.id}','a',this)">A</button>
          </div>
        </div>`;
      grp.appendChild(card);
    });

    container.appendChild(grp);
  });
}

// ─── RENDER SCHEDULE ─────────────────────────────────────────────────────────
function renderSched() {
  const list = document.getElementById('sched-list');

  const selected = M.filter(m => ss(m.id)!=='none');
  const visible = selected.filter(m => {
    if (!sportFilt[m.sport]) return false;
    const s = ss(m.id);
    return (s==='both'&&filt.both)||(s==='j'&&filt.j)||(s==='a'&&filt.a);
  }).sort((a,b) => a.ds!==b.ds?a.ds.localeCompare(b.ds):a.sm-b.sm);

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty"><div class="ico">📺</div>${selected.length===0?'Tap <strong>J</strong> or <strong>A</strong> on any match to add it here.':'No matches with current filters.'}</div>`;
    return;
  }

  const conflicts = findConflicts(visible);
  const byDate = {}, order = [];
  visible.forEach(m => { if(!byDate[m.ds]){byDate[m.ds]=[];order.push(m.ds);} byDate[m.ds].push(m); });

  list.innerHTML = '';
  order.forEach(ds => {
    const dh = document.createElement('div');
    dh.className = 'day-head';
    dh.style.marginBottom = '8px';
    dh.innerHTML = `<span class="day-name" style="font-size:15px">${byDate[ds][0].date}</span>`;
    list.appendChild(dh);

    byDate[ds].forEach(m => {
      const state = ss(m.id);
      const isC = conflicts.has(m.id);
      const div = document.createElement('div');
      div.className = `sched-card sl-${m.sport}`;

      const matchupClass = m.isSession ? 'smatchup-wrap' : 'smatchup';

      div.innerHTML = `
        <div class="stime">${m.t}${isC?'<span class="conflict-tag">⚠ overlap</span>':''}</div>
        <div class="smain">
          <div class="${matchupClass}">${m.sport==='wc'?'⚽':'🎾'} ${m.matchup}</div>
          <div class="smeta">${m.meta}</div>
        </div>
        <div class="swho">
          ${state==='j'||state==='both'?'<span class="sbadge sbj">J</span>':''}
          ${state==='a'||state==='both'?'<span class="sbadge sba">A</span>':''}
        </div>`;
      list.appendChild(div);
    });
  });
}

function findConflicts(matches) {
  const out = new Set();
  for (let i=0;i<matches.length;i++) {
    for (let j=i+1;j<matches.length;j++) {
      const a=matches[i], b=matches[j];
      if (a.ds!==b.ds) continue;
      const gap = Math.abs(a.sm-b.sm);
      if (gap < 120) {
        const as=ss(a.id), bs=ss(b.id);
        const aJ=as==='j'||as==='both', aA=as==='a'||as==='both';
        const bJ=bs==='j'||bs==='both', bA=bs==='a'||bs==='both';
        if ((aJ&&bJ)||(aA&&bA)) { out.add(a.id); out.add(b.id); }
      }
    }
  }
  return out;
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function render() { renderAll(); renderSched(); }

function toggleSport(s) {
  sportFilt[s] = !sportFilt[s];
  document.getElementById('pill-' + s).classList.toggle('off', !sportFilt[s]);
  render();
}

function show(v, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('v-all').style.display = v==='all'?'block':'none';
  document.getElementById('v-sched').style.display = v==='sched'?'block':'none';
}

function tf(f) {
  filt[f] = !filt[f];
  document.getElementById('fb-'+f).classList.toggle('off', !filt[f]);
  renderSched();
}

function dayLabel(ds) {
  const d = new Date(ds+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

function courtShort(matchup) {
  if (matchup.includes('Centre Court')) return 'CC';
  if (matchup.includes('No. 1 Court')) return 'C1';
  return 'OC';
}

render();
