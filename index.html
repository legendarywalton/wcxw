<style>
  :root {
    /* ── Beach-bar palette — Aruba first ── */
    --sand:        #F5EDD6;   /* sun-bleached linen — primary bg */
    --sand-dark:   #EDE0C0;   /* slightly toasted, rule/divider */
    --coral:       #E8714A;   /* Aruba sunset / WC red energy */
    --ocean:       #2A7FC1;   /* Caribbean blue, horizon */
    --seafoam:     #D6EFE8;   /* pale turquoise, card wash */

    /* ── Wimbledon — on vacation ── */
    --wim-green:   #2D6B45;   /* deep grass green, shaded */
    --wim-purple:  #6B3FA0;   /* cocktail umbrella purple */
    --wim-gold:    #C9A84C;   /* trophy / Pimm's cup gold */
    --wim-green-pale:  #DFF0E6;
    --wim-purple-pale: #EDE0F8;

    /* ── World Cup — beachside ── */
    --wc-navy:     #1A3A6B;   /* deep water navy */
    --wc-red:      #D63A2A;   /* hot sun red */
    --wc-navy-pale: #D8E4F5;
    --wc-red-pale:  #FAE0DC;

    /* ── Neutrals ── */
    --charcoal:    #2A2520;
    --mid:         #6B6258;
    --light:       #9E9488;
    --white:       #FFFDF7;
    --card:        #FFFDF7;
    --shadow:      0 0 0 1px rgba(42,37,32,0.08);
    --shadow-lift: 0 0 0 1px rgba(42,37,32,0.16);
    --r:           0px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--sand);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(232,113,74,0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 0%, rgba(42,127,193,0.10) 0%, transparent 50%);
    color: var(--charcoal);
    font-family: 'Nunito', -apple-system, system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── ANIMATION KEYFRAMES ── */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
  }
  @keyframes sway {
    0%, 100% { transform: rotate(-1deg); }
    50%       { transform: rotate(1deg); }
  }
  .pop { /* removed: cards stay flat, the marching border provides tap feedback */ }

  /* ─── HEADER — beach bar chalkboard ── */
  header {
    position: relative;
    overflow: hidden;
    background: #152820;
    padding: 0;
  }

t%20x%3D%22721.0%22%20y%3D%22301.0%22%20width%3D%224.0%22%20height%3D%2216.0%22%20rx%3D%221.5%22%20fill%3D%22%23C84030%22%20transform%3D%22rotate%28-45%20723.0%20309.0%29%22%2F%3E%0A%3Crect%20x%3D%22763.0%22%20y%3D%22296.0%22%20width%3D%227.0%22%20height%3D%2226.0%22%20rx%3D%221.5%22%20fill%3D%22%23C84030%22%20transform%3D%22rotate%28-45%20766.5%20309.0%29%22%2F%3E%0A%3Crect%20x%3D%22779.0%22%20y%3D%22301.0%22%20width%3D%224.0%22%20height%3D%2216.0%22%20rx%3D%221.5%22%20fill%3D%22%23C84030%22%20transform%3D%22rotate%28-45%20781.0%20309.0%29%22%2F%3E%0A%3Crect%20x%3D%22821.0%22%20y%3D%22296.0%22%20width%3D%227.0%22%20height%3D%2226.0%22%20rx%3D%221.5%22%20fill%3D%22%23C84030%22%20transform%3D%22rotate%28-45%20824.5%20309.0%29%22%2F%3E%0A%3Crect%20x%3D%22837.0%22%20y%3D%22301.0%22%20width%3D%224.0%22%20height%3D%2216.0%22%20rx%3D%221.5%22%20fill%3D%22%23C84030%22%20transform%3D%22rotate%28-45%20839.0%20309.0%29%22%2F%3E%0A%3C%2Fg%3E%0A%3C%2Fsvg%3E");
    background-size: cover;
    background-position: left center;
    z-index: 0;
  }

  /* Gold ticker stripe top */
  header::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg,
      var(--wim-gold) 0%,
      var(--coral) 35%,
      var(--wim-purple) 65%,
      var(--wim-gold) 100%
    );
    z-index: 3;
  }

  .header-inner {
    position: relative;
    z-index: 2;
    padding: 28px 20px 32px;
    text-align: center;
    color: var(--white);
  }

  /* Racket + title row */
  .header-mark {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 14px;
    position: relative;
  }
  .header-racket {
    height: 96px;
    width: auto;                /* fixed height + auto width preserves aspect */
    filter: drop-shadow(0 6px 14px rgba(0,0,0,0.5));
    flex-shrink: 0;
    transform: rotate(-12deg);  /* resting lean — head angled to the left */
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .header-racket:hover {
    transform: rotate(-17deg) scale(1.05);
  }
  .header-text-block {
    text-align: left;
    padding-left: 6px;
  }
  .header-wcxw {
    font-family: "Playfair Display", Georgia, serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--wim-gold);
    text-transform: uppercase;
    margin-bottom: 2px;
    opacity: 0.9;
  }
  .header-locale {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    margin-top: 4px;
  }

  header h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 32px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1.05;
    color: #fff;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  header h1 em {
    font-style: normal;
    color: var(--wim-gold);
  }

  .header-tagline {
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    margin-top: 6px;
    font-style: italic;
  }

  .header-sports {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .hs-pill {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.3px;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(255,255,255,0.12);
    border: 1.5px solid rgba(255,255,255,0.28);
    color: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
    cursor: pointer;
    font-family: 'Nunito', inherit;
    transition: background 0.15s, opacity 0.15s, transform 0.12s cubic-bezier(.34,1.56,.64,1);
  }
  .hs-pill:hover { background: rgba(255,255,255,0.22); }
  .hs-pill:active { transform: scale(0.93); }
  .hs-pill.off {
    background: rgba(255,255,255,0.05);
    border-color: rgba(255,255,255,0.12);
    opacity: 0.4;
    text-decoration: line-through;
  }

  .sub {
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.45);
    margin-top: 10px;
    letter-spacing: 0.3px;
  }

  /* ─── STICKY TOP BAR ───────────────────────────────────────────
     Header + key bar + tabs ride together and lock to the top of the
     viewport. Past a small scroll threshold the header condenses to a
     slim brand row so the pinned area stays out of the way and the
     match list keeps the screen. */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 50;
  }
  /* animate the pieces that change between full and condensed */
  .header-inner { transition: padding 0.28s ease; }
  .header-racket { transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), height 0.28s ease; }
  header h1 { transition: font-size 0.28s ease; }
  .header-mark { transition: margin 0.28s ease, gap 0.28s ease; }
  .header-wcxw, .header-locale, .header-tagline, .sub, .header-sports, .key-bar {
    overflow: hidden;
    transition: max-height 0.28s ease, opacity 0.2s ease,
                margin 0.28s ease, padding 0.28s ease, border-width 0.28s ease;
  }

  #topbar.condensed .header-inner { padding: 9px 16px 10px; }
  #topbar.condensed .header-racket { height: 40px; }
  #topbar.condensed .header-mark { margin-bottom: 0; gap: 11px; }
  #topbar.condensed header h1 { font-size: 19px; }
  #topbar.condensed header h1 br { display: none; }
  #topbar.condensed .header-wcxw,
  #topbar.condensed .header-locale,
  #topbar.condensed .header-tagline,
  #topbar.condensed .sub,
  #topbar.condensed .header-sports {
    max-height: 0; opacity: 0;
    margin-top: 0; margin-bottom: 0; padding-top: 0; padding-bottom: 0;
  }
  #topbar.condensed .key-bar {
    max-height: 0; opacity: 0;
    padding-top: 0; padding-bottom: 0; border-bottom-width: 0;
  }
  @media (prefers-reduced-motion: reduce) {
    .header-inner, .header-racket, header h1, .header-mark,
    .header-wcxw, .header-locale, .header-tagline, .sub,
    .header-sports, .key-bar { transition: none; }
  }

  /* ─── KEY BAR ── */
  .key-bar {
    background: var(--white);
    border-bottom: 2px solid var(--sand-dark);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }
  .key-items { display: flex; gap: 16px; flex-wrap: wrap; }
  .ki { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--mid); }
  .dot { width: 26px; height: 6px; border-radius: 3px; flex-shrink: 0; }
  .d-wc  { background: linear-gradient(90deg, var(--wc-navy) 55%, var(--coral) 100%); }
  .d-wim { background: linear-gradient(90deg, var(--wim-green) 45%, var(--wim-purple) 100%); }
  .key-note { font-size: 10px; font-weight: 600; color: var(--light); font-style: italic; }

  /* ─── TABS ── */
  .tabs {
    display: flex;
    background: var(--white);
    border-bottom: 2px solid var(--sand-dark);
    overflow-x: auto;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 12px 22px;
    font-family: 'Nunito', inherit;
    font-size: 13px;
    font-weight: 800;
    border: none;
    background: none;
    color: var(--light);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .tab.on { color: var(--wim-green); border-bottom-color: var(--wim-green); }

  /* ─── LAYOUT ── */
  main { max-width: 680px; margin: 0 auto; padding: 20px 14px 56px; }
  #v-all, #v-sched { animation: slideUp 0.25s ease; }

  /* ─── DAY GROUP ── */
  .day-group { margin-bottom: 28px; }

  .day-head {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 12px;
    padding-bottom: 9px;
    border-bottom: 2px solid var(--sand-dark);
    position: relative;
  }
  /* Gold left accent */
  .day-head::before {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 48px; height: 2px;
    background: var(--wim-gold);
    border-radius: 1px;
  }

  .day-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--charcoal);
  }
  .day-label { font-size: 11px; font-weight: 700; color: var(--light); }
  .day-sel-count {
    margin-left: auto;
    font-size: 11px;
    font-weight: 800;
    color: var(--wim-gold);
    background: rgba(201,168,76,0.14);
    border: 1.5px solid rgba(201,168,76,0.3);
    padding: 2px 10px;
    border-radius: 12px;
  }

  /* ─── MATCH CARD ── */
  .card {
    background: var(--card);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    margin-bottom: 10px;
    overflow: visible;
    position: relative;
    border: 2px solid transparent;
    transition: border-color 0.14s, box-shadow 0.18s, transform 0.18s;
  }
  .card:hover { box-shadow: var(--shadow-lift); transform: translateY(-2px); }

  /* Sport tints — warm, sun-bleached feel */
  .wc-card  { background: linear-gradient(160deg, rgba(26,58,107,0.04), rgba(214,58,42,0.02)); }
  .wim-card { background: linear-gradient(160deg, rgba(45,107,69,0.045), rgba(107,63,160,0.02)); }

  /* Selection borders */
  .card.sel-j.wc-card  { border-color: var(--wc-navy); }
  .card.sel-j.wim-card { border-color: var(--wim-green); }
  .card.sel-a.wc-card  { border-color: var(--coral); }
  .card.sel-a.wim-card { border-color: var(--wim-purple); }
  .card.sel-both        { border-color: var(--wim-gold); }

  /* Sport stripe — thicker, more expressive */
  .sport-stripe { height: 6px; width: 100%; }
  .stripe-wc  { background: linear-gradient(90deg, var(--wc-navy) 0%, var(--ocean) 50%, var(--coral) 100%); }
  .stripe-wim { background: linear-gradient(90deg, var(--wim-green) 0%, #3D8C5A 40%, var(--wim-purple) 100%); }

  .card-body {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px 13px;
  }

  /* Time pill — warmer feel */
  .time-col {
    flex-shrink: 0;
    width: 60px;
    border-radius: 12px;
    padding: 8px 4px;
    text-align: center;
    color: #fff;
  }
  .time-wc  { background: linear-gradient(150deg, var(--wc-navy), #0F2548); }
  .time-wim { background: linear-gradient(150deg, var(--wim-green), #1A4229); }
  .time-num { font-size: 14px; font-weight: 900; line-height: 1.05; }
  .time-ap  { font-size: 8px; font-weight: 800; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 1px; }

  /* Content */
  .content { flex: 1; min-width: 0; }
  .sport-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 4px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .tag-wc  { color: var(--wc-navy);    background: var(--wc-navy-pale); }
  .tag-wim { color: var(--wim-green);  background: var(--wim-green-pale); }

  .matchup      { font-size: 15px; font-weight: 700; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .matchup-wrap { font-size: 14px; font-weight: 700; line-height: 1.3; white-space: normal; }
  .meta { font-size: 10px; font-weight: 600; color: var(--light); margin-top: 3px; }

  .court-tag {
    display: inline-block;
    background: var(--wim-purple);
    color: #fff;
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.3px;
    padding: 1px 6px;
    border-radius: 6px;
    margin-right: 4px;
    vertical-align: middle;
  }
  .session-note {
    font-size: 10px;
    font-weight: 600;
    color: var(--light);
    font-style: italic;
    margin-top: 4px;
  }

  /* ─── SELECTOR BUTTONS ── */
  /* J = Jordan → WC navy; A = Anasa → Wimbledon purple */
  .sels { display: flex; flex-direction: column; gap: 5px; flex-shrink: 0; }
  .sb {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2.5px solid;
    background: var(--white);
    cursor: pointer;
    font-family: 'Nunito', inherit;
    font-weight: 900;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s cubic-bezier(.34,1.56,.64,1), background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .sb:active { transform: scale(0.82); }
  .sb-j { border-color: var(--wc-navy); color: var(--wc-navy); }
  .sb-j.on {
    background:
      linear-gradient(var(--white), var(--white)) padding-box,
      conic-gradient(from 0deg,
        var(--wim-green)  0deg,
        var(--wim-gold)   72deg,
        var(--coral)      144deg,
        var(--wim-purple) 216deg,
        var(--ocean)      288deg,
        var(--wim-green)  360deg
      ) border-box;
    border: 3px solid transparent;
    color: var(--charcoal);
  }
  .sb-a { border-color: var(--wim-purple); color: var(--wim-purple); }
  .sb-a.on {
    background:
      linear-gradient(var(--white), var(--white)) padding-box,
      conic-gradient(from 180deg,
        var(--wim-green)  0deg,
        var(--wim-gold)   72deg,
        var(--coral)      144deg,
        var(--wim-purple) 216deg,
        var(--ocean)      288deg,
        var(--wim-green)  360deg
      ) border-box;
    border: 3px solid transparent;
    color: var(--charcoal);
  }
  .sb.on { transform: scale(1.1); }
  .sb.on:active { transform: scale(0.9); }

  /* ─── SCHEDULE VIEW ── */
  #v-sched { display: none; }

  .sched-filters {
    display: flex;
    gap: 7px;
    margin-bottom: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  .sched-filters span { font-size: 12px; font-weight: 700; color: var(--light); }
  .fb {
    padding: 6px 16px;
    border-radius: 20px;
    font-family: 'Nunito', inherit;
    font-size: 12px;
    font-weight: 800;
    border: 2px solid;
    cursor: pointer;
    transition: transform 0.12s cubic-bezier(.34,1.56,.64,1), background 0.12s, color 0.12s;
  }
  .fb:active { transform: scale(0.92); }
  .fb-j     { border-color: var(--wc-navy);    color: var(--wc-navy);    background: var(--wc-navy-pale); }
  .fb-j.off { background: transparent; color: var(--light); border-color: var(--sand-dark); }
  .fb-a     { border-color: var(--wim-purple); color: var(--wim-purple); background: var(--wim-purple-pale); }
  .fb-a.off { background: transparent; color: var(--light); border-color: var(--sand-dark); }
  .fb-both  { border-color: var(--wim-gold);   color: #6E5200;           background: rgba(201,168,76,0.15); }
  .fb-both.off { background: transparent; color: var(--light); border-color: var(--sand-dark); }

  .empty { text-align: center; padding: 52px 16px; font-size: 14px; font-weight: 600; color: var(--light); }
  .empty .ico { font-size: 40px; margin-bottom: 12px; }

  .sched-card {
    background: var(--card);
    border-radius: var(--r);
    box-shadow: var(--shadow);
    padding: 12px 15px;
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    gap: 11px;
    border-left: 5px solid transparent;
    animation: slideUp 0.22s ease;
    transition: box-shadow 0.18s, transform 0.18s;
  }
  .sched-card:hover { box-shadow: var(--shadow-lift); transform: translateY(-2px); }
  .sl-wc  { border-left-color: var(--wc-navy); }
  .sl-wim { border-left-color: var(--wim-green); }

  .stime { font-size: 13px; font-weight: 900; color: var(--mid); flex-shrink: 0; min-width: 62px; }
  .smain { flex: 1; min-width: 0; }
  .smatchup      { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .smatchup-wrap { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .smeta { font-size: 10px; font-weight: 600; color: var(--light); margin-top: 2px; }

  .swho { display: flex; gap: 4px; flex-shrink: 0; }
  .sbadge { padding: 3px 9px; border-radius: 12px; font-size: 10px; font-weight: 900; }
  .sbj {
    background:
      linear-gradient(var(--white), var(--white)) padding-box,
      conic-gradient(from 0deg,
        var(--wim-green) 0deg, var(--wim-gold) 72deg,
        var(--coral) 144deg, var(--wim-purple) 216deg,
        var(--ocean) 288deg, var(--wim-green) 360deg
      ) border-box;
    border: 2.5px solid transparent;
    color: var(--charcoal);
  }
  .sba {
    background:
      linear-gradient(var(--white), var(--white)) padding-box,
      conic-gradient(from 180deg,
        var(--wim-green) 0deg, var(--wim-gold) 72deg,
        var(--coral) 144deg, var(--wim-purple) 216deg,
        var(--ocean) 288deg, var(--wim-green) 360deg
      ) border-box;
    border: 2.5px solid transparent;
    color: var(--charcoal);
  }

  .conflict-tag {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(232,113,74,0.12);
    border: 1.5px solid rgba(232,113,74,0.4);
    border-radius: 8px;
    padding: 2px 7px;
    font-size: 9px;
    font-weight: 800;
    color: #8B3A1A;
    margin-left: 6px;
    animation: shake 0.4s ease;
  }

  /* ─── FOOTER FLOURISH ── */
  .footer-bar {
    text-align: center;
    padding: 28px 16px 16px;
    font-size: 18px;
    letter-spacing: 5px;
    opacity: 0.35;
  }

  /* ══════════════════════════════════════════
     DARK MODE — sunset / tiki bar
  ══════════════════════════════════════════ */
  @media (prefers-color-scheme: dark) {
    :root {
      --sand:        #1C1A15;
      --sand-dark:   rgba(255,255,255,0.10);
      --charcoal:    #F0EAD6;
      --mid:         #B0A898;
      --light:       #756D62;
      --white:       #252118;
      --card:        #252118;
      --shadow:      0 0 0 1px rgba(255,255,255,0.05);
      --shadow-lift: 0 0 0 1px rgba(255,255,255,0.10);

      /* Sport colors — lifted for dark */
      --wc-navy:     #5B90E8;
      --wc-red:      #E85840;
      --wc-navy-pale: rgba(91,144,232,0.18);
      --wc-red-pale:  rgba(232,88,64,0.15);

      --wim-green:   #3DB870;
      --wim-purple:  #B068E0;
      --wim-gold:    #DDB84A;
      --wim-green-pale:  rgba(61,184,112,0.15);
      --wim-purple-pale: rgba(176,104,224,0.18);

      --coral:       #F08060;
      --ocean:       #4A9FE0;
    }

    body {
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(232,113,74,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 0%, rgba(42,127,193,0.07) 0%, transparent 50%);
    }

    .wc-card  { background: linear-gradient(160deg, rgba(91,144,232,0.10), rgba(232,88,64,0.04)); }
    .wim-card { background: linear-gradient(160deg, rgba(61,184,112,0.10), rgba(176,104,224,0.04)); }

    .time-wc  { background: linear-gradient(150deg, #1A3A6B, #0F2030); }
    .time-wim { background: linear-gradient(150deg, #1A4229, #0F2618); }

    .tab.on { color: var(--wim-green); border-bottom-color: var(--wim-green); }
    .day-sel-count { background: rgba(221,184,74,0.15); color: var(--wim-gold); }
    .conflict-tag { background: rgba(240,128,96,0.15); border-color: rgba(240,128,96,0.4); color: #F0A080; }
    .fb-both { color: var(--wim-gold); background: rgba(221,184,74,0.15); }
  }
/* ─── EASTER EGG ─── */
  @keyframes eggPop {
    0%   { transform: rotate(var(--egg-rot, 0deg)) scale(0);    opacity: 0; }
    55%  { transform: rotate(var(--egg-rot, 0deg)) scale(1.22); opacity: 1; }
    72%  { transform: rotate(var(--egg-rot, 0deg)) scale(0.88); }
    86%  { transform: rotate(var(--egg-rot, 0deg)) scale(1.07); }
    100% { transform: rotate(var(--egg-rot, 0deg)) scale(1);    opacity: 1; }
  }
  @keyframes eggOut {
    from { transform: rotate(var(--egg-rot, 0deg)) scale(1); opacity: 1; }
    to   { transform: rotate(var(--egg-rot, 0deg)) scale(0); opacity: 0; }
  }
  .egg {
    position: absolute;
    top: -18px;
    left: -6px;
    z-index: 20;
    pointer-events: none;
    transform-origin: bottom left;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.28));
  }
  .egg svg, .egg img { display: block; height: 64px; width: auto; }
  .egg.hidden { display: none; }
  .egg.show { animation: eggPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  .egg.out  { animation: eggOut 0.22s ease-in forwards; }
  @media (prefers-reduced-motion: reduce) {
    .egg.show { animation: none; opacity: 1; transform: rotate(var(--egg-rot,0deg)) scale(1); }
    .egg.out  { animation: none; opacity: 0; }
  }
  /* ─── ANIMATED BORDER RING ─── */
  @keyframes borderMarch {
    to { stroke-dashoffset: var(--march, -1200px); }
  }
  .card-ring {
    position: absolute;
    /* offset out by the card's 2px transparent border so the trail
       sits on the card's true outer edge, not inside the border */
    top: -2px;
    left: -2px;
    pointer-events: none;
    z-index: 10;
    overflow: visible;
    opacity: 0;
    transition: opacity 0.35s;
  }
  .card.ring-on .card-ring {
    opacity: 1;
  }
  .card.ring-on .card-ring rect {
    animation: borderMarch 4s linear infinite;
  }
  @media (prefers-reduced-motion: reduce) {
    .card.ring-on .card-ring rect { animation: none; }
  }

  /* ─── LIVE SCORE PANEL ─── */
  .live-panel {
    border-top: 1px dashed var(--sand-dark);
    padding: 0 14px;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.34s ease, opacity 0.28s ease, padding 0.34s ease;
  }
  .card.live-open .live-panel {
    max-height: 520px;
    opacity: 1;
    padding: 12px 14px 14px;
  }
  .live-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .live-badge {
    font-size: 9px; font-weight: 900; letter-spacing: 0.6px; text-transform: uppercase;
    padding: 3px 8px; color: #fff; white-space: nowrap;
  }
  .live-badge.is-live { background: var(--coral); }
  .live-badge.is-live::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: #fff; margin-right: 5px; vertical-align: middle;
    animation: livePulse 1.1s ease-in-out infinite;
  }
  .live-badge.is-pre  { background: var(--mid); }
  .live-badge.is-post { background: var(--wim-green); }
  .live-badge.is-off  { background: var(--light); }
  .live-status { font-size: 11px; font-weight: 800; color: var(--mid); }
  .live-refresh { margin-left: auto; font-size: 10px; font-weight: 700; color: var(--light); white-space: nowrap; }
  @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  /* soccer */
  .sc-row { display: flex; align-items: center; gap: 10px; padding: 5px 0; }
  .sc-name { font-size: 14px; font-weight: 800; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sc-score { font-size: 22px; font-weight: 900; font-variant-numeric: tabular-nums; min-width: 26px; text-align: right; color: var(--charcoal); }
  .sc-row.lead .sc-score { color: var(--coral); }

  /* tennis */
  .tn-table { width: 100%; border-collapse: collapse; }
  .tn-table td { padding: 5px 4px; font-weight: 800; }
  .tn-player { font-size: 13px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; color: var(--charcoal); }
  .tn-set { font-size: 14px; text-align: center; width: 22px; font-variant-numeric: tabular-nums; color: var(--light); }
  .tn-set.cur { color: var(--charcoal); }
  .tn-game { font-size: 15px; text-align: center; width: 30px; font-weight: 900; color: var(--coral); font-variant-numeric: tabular-nums; }
  .tn-serve { color: var(--wim-gold); font-size: 11px; }
  .tn-row.won .tn-player { color: var(--wim-green); }

  /* messages / states */
  .live-msg { font-size: 12px; font-weight: 600; color: var(--mid); line-height: 1.45; padding: 2px 0; }
  .live-retry {
    display: inline-block; margin-top: 9px; font-family: 'Nunito', inherit; font-size: 11px; font-weight: 800;
    padding: 6px 14px; border: 2px solid var(--ocean); color: var(--ocean); background: transparent; cursor: pointer;
    transition: transform 0.12s cubic-bezier(.34,1.56,.64,1);
  }
  .live-retry:active { transform: scale(0.93); }
  .live-list-item { padding: 8px 0; border-bottom: 1px solid var(--sand-dark); }
  .live-list-item:last-child { border-bottom: none; }
  .live-skel { height: 14px; background: linear-gradient(90deg, var(--sand-dark) 25%, rgba(255,255,255,0.35) 50%, var(--sand-dark) 75%); background-size: 200% 100%; animation: skel 1.2s linear infinite; margin: 7px 0; }
  @keyframes skel { to { background-position: -200% 0; } }
  .live-src { font-size: 9px; color: var(--light); margin-top: 11px; font-style: italic; }
  @media (prefers-reduced-motion: reduce) {
    .live-badge.is-live::before, .live-skel { animation: none; }
  }

</style>
</head>

// ─── STATE ────────────────────────────────────────────────────────────────────
const sel = {};
M.forEach(m => sel[m.id] = new Set());
const filt = {j:true, a:true, both:true};
const sportFilt = {wc:true, wim:true};
var ringCardId = null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const ss = id => { const s = sel[id]; const j=s.has('j'), a=s.has('a'); return j&&a?'both':j?'j':a?'a':'none'; };
const tog = (id, p, btn) => {
  sel[id].has(p)?sel[id].delete(p):sel[id].add(p);
  render();
};

// ─── RENDER ALL MATCHES ───────────────────────────────────────────────────────
function renderAll() {
  const byDate = {}, order = [];
  M.forEach(m => { if(!byDate[m.ds]){byDate[m.ds]=[];order.push(m.ds);} byDate[m.ds].push(m); });
  const container = document.getElementById('v-all');
  container.innerHTML = '';

  order.forEach(ds => {
    const allMatches = byDate[ds].sort((a,b)=>a.sm-b.sm);
    const matches = allMatches.filter(m => sportFilt[m.sport]);
    if (matches.length === 0) return;

    const s = matches[0];
    const cnt = matches.filter(m=>ss(m.id)!=='none').length;

    const grp = document.createElement('div');
    grp.className = 'day-group';
    grp.innerHTML = `<div class="day-head">
      <span class="day-name">${s.date}</span>
      <span class="day-label">${dayLabel(ds)}</span>
      ${cnt>0?`<span class="day-sel-count">${cnt} selected</span>`:''}
    </div>`;

    matches.forEach(m => {
      const state = ss(m.id);
      const card = document.createElement('div');
      card.className = 'card ' + m.sport + '-card' + (state!=='none'?' sel-'+state:'');
      card.setAttribute('data-id', m.id);
      card.addEventListener('click', function(e) {
        if (!e.target.closest('.sb') && !e.target.closest('.live-panel')) tapCard(m.id);
      });

      const timeParts = m.t.match(/^~?(\d+:\d+)\s*([AP]M)?$/) || [m.t, m.t, ''];
      const timeNum = (m.t.startsWith('~') ? '~' : '') + (timeParts[1] || m.t);
      const timeAP = timeParts[2] || '';

      let matchupHTML;
      if (m.isSession) {
        matchupHTML = `<div class="matchup-wrap">${m.sport==='wim'?`<span class="court-tag">${courtShort(m.matchup)}</span> `:''}${m.matchup}</div>`;
      } else if (m.court) {
        matchupHTML = `<div class="matchup"><span class="court-tag">${m.court.replace('No. ','C')}</span> ${m.matchup}</div>`;
      } else {
        matchupHTML = `<div class="matchup">${m.matchup}</div>`;
      }

      card.innerHTML = `
        <div class="egg hidden"></div>
        <svg class="card-ring" overflow="visible" width="10" height="10">
          <defs>
            <linearGradient id="rg-${m.id}" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%"   stop-color="#1A3A6B"/>
              <stop offset="12%"  stop-color="#fff6e0"/>
              <stop offset="25%"  stop-color="#D63A2A"/>
              <stop offset="38%"  stop-color="#fff6e0"/>
              <stop offset="50%"  stop-color="#C9A84C"/>
              <stop offset="62%"  stop-color="#fff6e0"/>
              <stop offset="75%"  stop-color="#2D6B45"/>
              <stop offset="88%"  stop-color="#fff6e0"/>
              <stop offset="100%" stop-color="#6B3FA0"/>
            </linearGradient>
          </defs>
          <rect x="2" y="2" width="200" height="80" rx="0"
                fill="none"
                stroke="url(#rg-${m.id})"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-dasharray="60 1000"
                stroke-dashoffset="0"/>
        </svg>
        <div class="sport-stripe stripe-${m.sport}"></div>
        <div class="card-body">
          <div class="time-col time-${m.sport}">
            <div class="time-num">${timeNum}</div>
            <div class="time-ap">${timeAP} AST</div>
          </div>
          <div class="content">
            <div class="sport-tag tag-${m.sport}">${m.sport==='wc'?'⚽ WORLD CUP':'🎾 WIMBLEDON'}</div>
            ${matchupHTML}
            <div class="meta">${m.meta}</div>
            ${m.sessionNote?`<div class="session-note">ℹ ${m.sessionNote}</div>`:''}
          </div>
          <div class="sels">
            <button class="sb sb-j${sel[m.id].has('j')?' on':''}" onclick="event.stopPropagation();tog('${m.id}','j',this)">J</button>
            <button class="sb sb-a${sel[m.id].has('a')?' on':''}" onclick="event.stopPropagation();tog('${m.id}','a',this)">A</button>
          </div>
        </div>`;
      grp.appendChild(card);
    });

    container.appendChild(grp);
  });

  restoreLiveState();
}

// ─── RENDER SCHEDULE ─────────────────────────────────────────────────────────
function renderSched() {
  const list = document.getElementById('sched-list');
  const selected = M.filter(m => ss(m.id)!=='none');
  const visible = selected.filter(m => {
    if (!sportFilt[m.sport]) return false;
    const s = ss(m.id);
    return (s==='both'&&filt.both)||(s==='j'&&filt.j)||(s==='a'&&filt.a);
  }).sort((a,b) => a.ds!==b.ds?a.ds.localeCompare(b.ds):a.sm-b.sm);

  if (visible.length === 0) {
    list.innerHTML = `<div class="empty"><div class="ico">🍹</div>${selected.length===0?'Tap <strong>J</strong> or <strong>A</strong> on any match to add it here.':'No matches with current filters.'}</div>`;
    return;
  }

  const conflicts = findConflicts(visible);
  const byDate = {}, order = [];
  visible.forEach(m => { if(!byDate[m.ds]){byDate[m.ds]=[];order.push(m.ds);} byDate[m.ds].push(m); });

  list.innerHTML = '';
  order.forEach(ds => {
    const dh = document.createElement('div');
    dh.className = 'day-head';
    dh.style.marginBottom = '8px';
    dh.innerHTML = `<span class="day-name" style="font-size:16px">${byDate[ds][0].date}</span>`;
    list.appendChild(dh);

    byDate[ds].forEach(m => {
      const state = ss(m.id);
      const isC = conflicts.has(m.id);
      const div = document.createElement('div');
      div.className = `sched-card sl-${m.sport}`;
      const matchupClass = m.isSession ? 'smatchup-wrap' : 'smatchup';
      div.innerHTML = `
        <div class="stime">${m.t}${isC?'<span class="conflict-tag">⚠ overlap</span>':''}</div>
        <div class="smain">
          <div class="${matchupClass}">${m.sport==='wc'?'⚽':'🎾'} ${m.matchup}</div>
          <div class="smeta">${m.meta}</div>
        </div>
        <div class="swho">
          ${state==='j'||state==='both'?'<span class="sbadge sbj">J</span>':''}
          ${state==='a'||state==='both'?'<span class="sbadge sba">A</span>':''}
        </div>`;
      list.appendChild(div);
    });
  });
}

function findConflicts(matches) {
  const out = new Set();
  for (let i=0;i<matches.length;i++) {
    for (let j=i+1;j<matches.length;j++) {
      const a=matches[i], b=matches[j];
      if (a.ds!==b.ds) continue;
      const gap = Math.abs(a.sm-b.sm);
      if (gap < 120) {
        const as=ss(a.id), bs=ss(b.id);
        const aJ=as==='j'||as==='both', aA=as==='a'||as==='both';
        const bJ=bs==='j'||bs==='both', bA=bs==='a'||bs==='both';
        if ((aJ&&bJ)||(aA&&bA)) { out.add(a.id); out.add(b.id); }
      }
    }
  }
  return out;
}

// ─── UI ───────────────────────────────────────────────────────────────────────
function render() { renderAll(); renderSched(); }

function toggleSport(s) {
  sportFilt[s] = !sportFilt[s];
  document.getElementById('pill-' + s).classList.toggle('off', !sportFilt[s]);
  render();
}

function show(v, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('v-all').style.display = v==='all'?'block':'none';
  document.getElementById('v-sched').style.display = v==='sched'?'block':'none';
}

function tf(f) {
  filt[f] = !filt[f];
  document.getElementById('fb-'+f).classList.toggle('off', !filt[f]);
  renderSched();
}

function dayLabel(ds) {
  const d = new Date(ds+'T12:00:00');
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

function courtShort(matchup) {
  if (matchup.includes('Centre Court')) return 'CC';
  if (matchup.includes('No. 1 Court')) return 'C1';
  return 'OC';
}

  if (!card) return;

  // ── Animated border: exclusive to the most recently tapped card ──
  if (ringCardId && ringCardId !== id) {
    var prev = document.querySelector('.card[data-id="' + ringCardId + '"]');
    if (prev) prev.classList.remove('ring-on');
  }
  var wasRingOn = card.classList.contains('ring-on');
  card.classList.toggle('ring-on', !wasRingOn);
  ringCardId = wasRingOn ? null : id;

  // Size the SVG ring to sit flush on the card's own edges
  if (!wasRingOn) sizeRing(id);

  // Live score panel follows the marching ring (one open at a time)
  if (ringCardId === id) openLive(id); else closeLive();

  // ── Easter egg ──
  var egg = card.querySelector('.egg');
  if (!egg) return;

  if (egg.classList.contains('show')) {
    // hide it
    egg.classList.remove('show');
    egg.classList.add('out');
    egg.addEventListener('animationend', function handler() {
      egg.classList.add('hidden');
      egg.classList.remove('out');
      egg.removeEventListener('animationend', handler);
    });
  } else {
    // pick a random icon (avoid repeating the one just shown)
    var idx = Math.floor(Math.random() * EGG_ICONS.length);
    if (EGG_ICONS.length > 1 && idx === lastEggIdx) {
      idx = (idx + 1 + Math.floor(Math.random() * (EGG_ICONS.length - 1))) % EGG_ICONS.length;
    }
    lastEggIdx = idx;
    var rot = EGG_ROTS[Math.floor(Math.random() * EGG_ROTS.length)];
    egg.style.setProperty('--egg-rot', rot + 'deg');
    egg.innerHTML = EGG_ICONS[idx];
    egg.classList.remove('hidden', 'out');
    egg.classList.add('show');
  }
}

/* ════════════════════════════════════════════════════════════════════════════
   LIVE SCORES  ·  ESPN public JSON  (no key, CORS-open) — the same data
   ESPN.com loads. This is NOT a literal FIFA / All England Club feed: those are
   undocumented and CORS-locked, so a static file cannot call them. ESPN is the
   practical, free, browser-callable proxy and covers both tournaments:
     soccer → fifa.world          tennis → atp + wta  (search both per match)

   Everything ESPN-specific lives in the fetch/normalize layer below, so if a
   field name drifts, you only edit readCompetitors / readStatus / fetch*.
   ──────────────────────────────────────────────────────────────────────────
   Tap a card → the marching ring turns on → this panel opens, fetches once,
   and auto-refreshes every 30s while the match is live (pauses when the tab is
   hidden, stops once final). One panel open at a time, tied to the ring.
════════════════════════════════════════════════════════════════════════════ */

var LIVE = {
  base: 'https://site.api.espn.com/apis/site/v2/sports',
  soccerLeague: 'soccer/fifa.world',
  tennisLeagues: ['tennis/atp', 'tennis/wta'],
  pollMs: 30000
};

// Common-name → ESPN-name fixups. Most teams/players match on their own; add a
// line here if one doesn't resolve (this is the single most likely tweak).
var ALIAS = {
  'usa': 'united states',
  'faa': 'auger aliassime'
};

var liveCache = {};        // id -> last normalized result (re-renders reuse, no refetch)
var liveOpenId = null;     // card id whose panel is open (== ringCardId)
var livePollTimer = null;

function cardEl(id){ return document.querySelector('.card[data-id="' + id + '"]'); }
function panelEl(id){ var c = cardEl(id); return c ? c.querySelector('.live-panel') : null; }

function ymd(ds){ return ds.replace(/-/g, ''); }
function shiftYmd(ds, days){
  var d = new Date(ds + 'T12:00:00Z');
  d.setUTCDate(d.getUTCDate() + days);
  return d.toISOString().slice(0,10).replace(/-/g,'');
}
function norm(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,'').replace(/\s+/g,' ').trim();
}
// pull comparable name tokens out of an app matchup string ("Raducanu [30] vs Ruzic")
function appTokens(matchup){
  var cleaned = matchup.replace(/\[[^\]]*\]/g,'').replace(/\([^)]*\)/g,'');
  return cleaned.split(/\s+vs?\s+/i).map(function(t){
    var n = norm(t);
    return ALIAS[n] || n;
  }).filter(Boolean);
}
// does an app token correspond to an ESPN competitor name?
function nameHit(token, compName){
  if(!token) return false;
  var c = norm(compName);
  if(c.indexOf(token) !== -1) return true;                 // substring
  var cj = c.replace(/ /g,''), tj = token.replace(/ /g,'');
  if(tj.length > 2 && cj.indexOf(tj) !== -1) return true;  // spaces-removed (hyphenated names)
  var cw = c.split(' ');
  var tw = token.split(' ').filter(function(w){ return w.length > 2; });
  if(tw.length && tw.every(function(w){ return cw.indexOf(w) !== -1; })) return true; // word subset
  var tLast = token.split(' ').pop(), cLast = cw[cw.length-1];     // surname
  return tLast.length > 2 && tLast === cLast;
}

function getJSON(url){
  return fetch(url, { cache: 'no-store' }).then(function(r){
    if(!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

// ── ESPN event → plain shape ───────────────────────────────────────────────
function readCompetitors(ev){
  var comp = (ev.competitions && ev.competitions[0]) || {};
  return (comp.competitors || []).map(function(c){
    var name = (c.team && (c.team.displayName || c.team.shortDisplayName))
            || (c.athlete && (c.athlete.displayName || c.athlete.shortName))
            || c.displayName || '—';
    var lines = (c.linescores || []).map(function(l){
      if(l == null) return null;
      return (l.value !== undefined && l.value !== null) ? l.value : l.displayValue;
    });
    return { name: name, score: c.score, winner: c.winner === true, linescores: lines, homeAway: c.homeAway };
  });
}
function readStatus(ev){
  var t = (ev.status && ev.status.type) || {};
  return {
    state: t.state || 'pre',
    completed: !!t.completed,
    detail: t.shortDetail || t.detail || t.description || '',
    clock: (ev.status && ev.status.displayClock) || '',
    period: (ev.status && ev.status.period) || 0
  };
}

// ── SOCCER ─────────────────────────────────────────────────────────────────
function soccerStatus(st){
  if(st.state === 'pre')  return 'Scheduled';
  if(st.state === 'post') return st.detail || 'Full time';
  return st.detail || st.clock || 'Live';
}
function fetchSoccer(m){
  var tokens = appTokens(m.matchup);
  var real = tokens.filter(function(t){ return t && !/\d|place|runner|winner|loser|group|seed/.test(t); });
  var dates = [ymd(m.ds)];
  if(m.sm >= 21*60) dates.push(shiftYmd(m.ds, 1));   // late AST kickoff can land next UTC day
  if(m.sm <  3*60)  dates.push(shiftYmd(m.ds, -1));

  var i = 0;
  function tryNext(){
    if(i >= dates.length) return { ok:false, reason:'nomatch' };
    var d = dates[i++];
    return getJSON(LIVE.base + '/' + LIVE.soccerLeague + '/scoreboard?dates=' + d).then(function(data){
      var events = data.events || [];
      var ev = events.find(function(ev){
        var comps = readCompetitors(ev);
        return real.length && real.every(function(tok){
          return comps.some(function(c){ return nameHit(tok, c.name); });
        });
      });
      if(!ev) return tryNext();
      var comps = readCompetitors(ev), st = readStatus(ev);
      return {
        ok:true, kind:'soccer', state:st.state, statusText: soccerStatus(st),
        teams: comps.map(function(c){
          return { name:c.name, score:(c.score != null ? c.score : '–'), winner:c.winner };
        })
      };
    }).catch(function(e){ if(i >= dates.length) throw e; return tryNext(); });
  }
  return Promise.resolve().then(tryNext);
}

// ── TENNIS ─────────────────────────────────────────────────────────────────
function tennisStatus(st){
  if(st.state === 'pre')  return 'Scheduled';
  if(st.state === 'post') return st.detail || 'Completed';
  return st.detail || 'In progress';
}
function shortPlayer(name){
  var parts = (name||'').trim().split(/\s+/);
  if(parts.length < 2) return name;
  return parts[0][0] + '. ' + parts.slice(1).join(' ');
}
function normTennisEvent(ev){
  var comps = readCompetitors(ev), st = readStatus(ev);
  var maxSets = comps.reduce(function(mx,c){ return Math.max(mx, c.linescores.length); }, 0);
  return {
    ok:true, kind:'tennis', state:st.state, statusText: tennisStatus(st), maxSets: maxSets,
    players: comps.map(function(c){ return { name: shortPlayer(c.name), sets: c.linescores, won: c.winner }; })
  };
}
function fetchTennisEvents(ds){
  return Promise.all(LIVE.tennisLeagues.map(function(lg){
    return getJSON(LIVE.base + '/' + lg + '/scoreboard?dates=' + ymd(ds))
      .then(function(d){ return d.events || []; })
      .catch(function(){ return []; });   // one tour failing shouldn't kill the other
  })).then(function(lists){
    return lists.reduce(function(a,b){ return a.concat(b); }, []);
  });
}
function fetchTennisMatch(m){
  var tokens = appTokens(m.matchup);
  return fetchTennisEvents(m.ds).then(function(events){
    if(!events.length) throw new Error('no tennis feed');
    var ev = events.find(function(ev){
      var comps = readCompetitors(ev);
      return tokens.every(function(tok){
        return comps.some(function(c){ return nameHit(tok, c.name); });
      });
    });
    if(!ev) return { ok:false, reason:'nomatch' };
    return normTennisEvent(ev);
  });
}
function fetchTennisSession(m){
  return fetchTennisEvents(m.ds).then(function(events){
    if(!events.length) throw new Error('no tennis feed');
    var court = courtShort(m.matchup); // CC / C1 / OC
    var live = events.filter(function(ev){ return readStatus(ev).state === 'in'; }).map(normTennisEvent);
    return { ok:true, kind:'tennis-list', court: court, live: live, count: live.length };
  });
}

// ── CONTROLLER ─────────────────────────────────────────────────────────────
function openLive(id){
  var card = cardEl(id);
  if(!card) return;
  if(liveOpenId && liveOpenId !== id){           // move focus off the previous card
    var prev = cardEl(liveOpenId);
    if(prev) prev.classList.remove('live-open');
  }
  var panel = card.querySelector('.live-panel');
  if(!panel){
    panel = document.createElement('div');
    panel.className = 'live-panel';
    panel.addEventListener('click', function(e){ e.stopPropagation(); });
    card.appendChild(panel);
  }
  liveOpenId = id;
  card.classList.add('live-open');
  if(liveCache[id]) renderLive(id, findM(id), liveCache[id]);
  loadLive(id, { silent: !!liveCache[id] });
  startPoll();
}
function closeLive(){
  if(liveOpenId){
    var card = cardEl(liveOpenId);
    if(card) card.classList.remove('live-open');
  }
  liveOpenId = null;
  stopPoll();
}
function findM(id){ return M.find(function(x){ return x.id === id; }); }

function loadLive(id, opts){
  opts = opts || {};
  var m = findM(id);
  var panel = panelEl(id);
  if(!m || !panel) return;
  if(!opts.silent && !liveCache[id]) panel.innerHTML = liveSkeleton();

  var p = (m.sport === 'wc')
    ? fetchSoccer(m)
    : (m.isSession ? fetchTennisSession(m) : fetchTennisMatch(m));

  p.then(function(res){
    if(liveOpenId !== id) return;          // closed while we were waiting
    liveCache[id] = res;
    renderLive(id, m, res);
    if(res && res.state === 'post') stopPoll();   // final — no need to keep polling
  }).catch(function(err){
    if(liveOpenId !== id) return;
    renderLiveError(id);
  });
}

function startPoll(){
  stopPoll();
  livePollTimer = setInterval(function(){
    if(!liveOpenId){ stopPoll(); return; }
    var c = liveCache[liveOpenId];
    if(c && c.state === 'post') return;    // leave the final score sitting there
    loadLive(liveOpenId, { silent: true });
  }, LIVE.pollMs);
}
function stopPoll(){ if(livePollTimer){ clearInterval(livePollTimer); livePollTimer = null; } }

document.addEventListener('visibilitychange', function(){
  if(document.hidden){ stopPoll(); }
  else if(liveOpenId){ loadLive(liveOpenId, { silent:true }); startPoll(); }
});

// rebuild the open panel after renderAll() wipes the card list (e.g. on J/A tap)
function restoreLiveState(){
  if(!liveOpenId) return;
  var id = liveOpenId, m = findM(id), card = cardEl(id);
  if(!card || !m || !sportFilt[m.sport]){     // card no longer on screen → close cleanly
    liveOpenId = null; stopPoll();
    if(ringCardId === id) ringCardId = null;
    return;
  }
  if(ringCardId === id) card.classList.add('ring-on');
  var panel = card.querySelector('.live-panel');
  if(!panel){
    panel = document.createElement('div');
    panel.className = 'live-panel';
    panel.addEventListener('click', function(e){ e.stopPropagation(); });
    card.appendChild(panel);
  }
  card.classList.add('live-open');
  if(liveCache[id]) renderLive(id, m, liveCache[id]); else loadLive(id, {});
  requestAnimationFrame(function(){ if(ringCardId === id) sizeRing(id); });
}

// ── RING SIZING (shared by tapCard + restore) ──────────────────────────────
function sizeRing(id){
  var card = cardEl(id); if(!card) return;
  var ring = card.querySelector('.card-ring'); if(!ring) return;
  var box = card.getBoundingClientRect();
  if(!box.width) return;                       // hidden (other tab) — skip
  var cw = box.width, ch = box.height, sw = 2.5, inset = sw/2;
  ring.setAttribute('width', cw);
  ring.setAttribute('height', ch);
  ring.setAttribute('viewBox', '0 0 ' + cw + ' ' + ch);
  var rect = ring.querySelector('rect'); if(!rect) return;
  rect.setAttribute('x', inset);
  rect.setAttribute('y', inset);
  rect.setAttribute('width', cw - sw);
  rect.setAttribute('height', ch - sw);
  var perimeter = 2 * ((cw - sw) + (ch - sw));
  var dashLen = Math.round(perimeter * 0.25);
  rect.setAttribute('stroke-dasharray', dashLen + ' ' + (perimeter - dashLen));
  rect.style.setProperty('--march', (-2 * Math.round(perimeter)) + 'px');
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function stamp(){
  return new Date().toLocaleTimeString([], { hour:'numeric', minute:'2-digit' });
}
function badge(state){
  if(state === 'in')   return '<span class="live-badge is-live">Live</span>';
  if(state === 'post') return '<span class="live-badge is-post">Final</span>';
  return '<span class="live-badge is-pre">Soon</span>';
}
function liveSkeleton(){
  return '<div class="live-head"><span class="live-badge is-pre">Live</span>' +
    '<span class="live-status">Fetching score…</span></div>' +
    '<div class="live-skel" style="width:70%"></div>' +
    '<div class="live-skel" style="width:52%"></div>';
}
function tennisTable(res){
  var rows = res.players.map(function(p){
    var cells = '';
    for(var i=0;i<res.maxSets;i++){
      var v = p.sets[i];
      var cur = (res.state === 'in' && i === res.maxSets-1);
      cells += '<td class="tn-set' + (cur?' cur':'') + '">' + (v != null ? v : '') + '</td>';
    }
    return '<tr class="tn-row' + (p.won?' won':'') + '">' +
      '<td class="tn-player">' + p.name + '</td>' + cells + '</tr>';
  }).join('');
  return '<table class="tn-table">' + rows + '</table>';
}
function renderLive(id, m, res){
  var panel = panelEl(id);
  if(!panel) return;
  if(!res || !res.ok) return renderLiveMiss(id, m);

  if(res.kind === 'soccer'){
    var rows = res.teams.map(function(t){
      return '<div class="sc-row' + (t.winner?' lead':'') + '">' +
        '<span class="sc-name">' + t.name + '</span>' +
        '<span class="sc-score">' + t.score + '</span></div>';
    }).join('');
    panel.innerHTML =
      '<div class="live-head">' + badge(res.state) +
        '<span class="live-status">' + res.statusText + '</span>' +
        '<span class="live-refresh">' + stamp() + '</span></div>' +
      rows +
      '<div class="live-src">ESPN feed · refreshes while live</div>';
  }
  else if(res.kind === 'tennis'){
    panel.innerHTML =
      '<div class="live-head">' + badge(res.state) +
        '<span class="live-status">' + res.statusText + '</span>' +
        '<span class="live-refresh">' + stamp() + '</span></div>' +
      tennisTable(res) +
      '<div class="live-src">ESPN feed · games &amp; sets (not point-by-point)</div>';
  }
  else if(res.kind === 'tennis-list'){
    var courtName = res.court === 'CC' ? 'Centre Court'
                  : res.court === 'C1' ? 'No. 1 Court' : 'the outer courts';
    var body = res.live.length
      ? res.live.map(function(ev){
          return '<div class="live-list-item">' +
            '<div class="live-head" style="margin-bottom:4px">' +
            '<span class="live-badge is-live">Live</span>' +
            '<span class="live-status">' + ev.statusText + '</span></div>' +
            tennisTable(ev) + '</div>';
        }).join('')
      : '<div class="live-msg">No Wimbledon matches are in progress right now.</div>';
    panel.innerHTML =
      '<div class="live-head"><span class="live-badge is-live">Live</span>' +
        '<span class="live-status">Wimbledon — in progress</span>' +
        '<span class="live-refresh">' + stamp() + '</span></div>' +
      '<div class="live-msg">' + courtName + ' matchups are posted the evening before. ' +
        'Showing matches live across the draw.</div>' +
      body +
      '<div class="live-src">ESPN feed · ' + res.count + ' live</div>';
  }
}
function renderLiveMiss(id, m){
  var panel = panelEl(id);
  if(!panel) return;
  var msg;
  if(m.sport === 'wc' && /\(|place|runner|winner|w\(m/i.test(m.matchup)){
    msg = 'This knockout slot isn’t filled yet — the bracket decides these teams as earlier rounds finish. The score appears here once the matchup is official.';
  } else {
    msg = 'Not in the feed yet. Far from start it may not be posted; closer to the time it should show up.';
  }
  panel.innerHTML =
    '<div class="live-head"><span class="live-badge is-pre">Soon</span>' +
      '<span class="live-status">No live match</span></div>' +
    '<div class="live-msg">' + msg + '</div>' +
    '<button class="live-retry" onclick="event.stopPropagation();loadLive(\'' + id + '\')">Check again</button>';
}
function renderLiveError(id){
  var panel = panelEl(id);
  if(!panel) return;
  panel.innerHTML =
    '<div class="live-head"><span class="live-badge is-off">Offline</span>' +
      '<span class="live-status">Couldn’t reach the feed</span></div>' +
    '<div class="live-msg">Live scores need a connection. If you opened this file straight from disk, the browser may be blocking the request — serve it over http (any host) and it works. Otherwise check wifi and retry.</div>' +
    '<button class="live-retry" onclick="event.stopPropagation();loadLive(\'' + id + '\')">Retry</button>';
}

render();

/* ── Condense the sticky header once the list starts scrolling ── */
(function(){
  var topbar = document.getElementById('topbar');
  if(!topbar) return;
  var ticking = false;
  function apply(){
    topbar.classList.toggle('condensed', window.scrollY > 36);
    ticking = false;
  }
  window.addEventListener('scroll', function(){
    if(!ticking){ requestAnimationFrame(apply); ticking = true; }
  }, { passive: true });
  apply();
})();
</script>
</body>
